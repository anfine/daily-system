<!DOCTYPE html>
<html lang="zh">

    <head>
        <meta charset="UTF-8">
        <title>Daily Pad</title>
        <style>
            body {
                font-family: sans-serif;
                margin: 20px;
            }

            textarea {
                width: 100%;
                box-sizing: border-box;
                font-size: 14px;
                margin-bottom: 20px;
            }

            .meta-item {
                margin-bottom: 10px;
            }

            button {
                margin-left: 10px;
                cursor: pointer;
            }

            .today-check {
                margin-left: 10px;
            }

            .toolbar {
                display: flex;
                gap: 10px;
                align-items: center;
                flex-wrap: wrap;
                margin-bottom: 12px;
            }

            .toolbar input {
                padding: 6px 8px;
            }

            .status-text {
                font-size: 13px;
                color: #555;
            }

            .panel {
                background: #f8f9fb;
                border: 1px solid #ddd;
                border-radius: 6px;
                padding: 12px;
                margin-top: 12px;
            }

            .queue-item {
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
                padding: 8px 0;
                border-top: 1px solid #e5e7eb;
            }

            .queue-item:first-child {
                border-top: none;
            }

            .queue-date {
                font-weight: 600;
                min-width: 110px;
            }

            .queue-meta {
                color: #666;
                font-size: 12px;
            }

            dialog {
                width: min(720px, 92vw);
                border: 1px solid #ccc;
                border-radius: 8px;
                padding: 16px;
            }

            dialog::backdrop {
                background: rgba(0, 0, 0, 0.35);
            }
        </style>
    </head>

    <body>

        <h2>Daily Record</h2>
        <textarea id="daily-content" rows="15" placeholder="今天的记录……"></textarea>

        <h2>Meta</h2>

        <div class="toolbar">
            <button onclick="refreshMetasFromAgent()">从接口刷新 Metas</button>
            <span id="meta-sync-status" class="status-text"></span>
        </div>

        <div style="margin-bottom: 12px;">
            <input id="new-meta-name" type="text" placeholder="新增一个 Meta（例如：阅读）" />
            <button onclick="addMeta()">＋ 添加</button>
        </div>

        <div id="meta-list"></div>

        <div style="margin-top: 10px;">
            <button onclick="applyToday()">完成（计入已打勾项）</button>
        </div>


        <h2>Meta Notes（手动）</h2>
        <textarea id="meta-notes" rows="6"
            placeholder="用于非积累型或复杂 meta，例如：\nnofap：14.5 → 15.4 → 16.3 → 17.3\n（这里手动维护就行）"></textarea>


        <h2>导出预览</h2>
        <div id="preview-container">
            <pre id="preview-text"
                style="white-space: pre-wrap; background: #f6f8fa; padding: 10px; border: 1px solid #ddd; border-radius: 4px;"></pre>
            <button onclick="copyPreview()">复制到剪贴板</button>
            <button onclick="sendToAgent()">发送到Agent</button>
            <div id="agent-status" style="margin-top:8px; font-size:13px;"></div>
        </div>

        <h2>按日期查看记录</h2>
        <div class="toolbar">
            <input id="entry-date" type="date" />
            <button onclick="showEntryByDate()">查看 entry</button>
            <span id="entry-fetch-status" class="status-text"></span>
        </div>

        <dialog id="entry-dialog">
            <h3 id="entry-dialog-title">记录详情</h3>
            <pre id="entry-dialog-content"
                style="white-space: pre-wrap; background: #f6f8fa; padding: 10px; border: 1px solid #ddd; border-radius: 4px;"></pre>
            <div style="margin-top: 12px;">
                <button onclick="closeEntryDialog()">关闭</button>
            </div>
        </dialog>

        <h2>待同步队列（<span id="pending-count">0</span>）</h2>
        <div class="toolbar">
            <button onclick="retryAllPending()">全部尝试同步</button>
            <span id="pending-status" class="status-text"></span>
        </div>
        <div id="pending-queue" class="panel"></div>

        <script>
            const API_BASE_URL = 'http://127.0.0.1:8787';
            const DEFAULT_METAS = [
                { key: 'english', label: '英语' },
                { key: 'program', label: 'Program' },
                { key: 'sport', label: '运动' },
            ];
            const META_LIST_KEY = 'meta-list';
            const META_NOTES_KEY = 'meta-notes';
            const PENDING_QUEUE_KEY = 'pending-entry-queue';
            const todayChecks = {};
            const todayApplied = {};

            function getMetaList() {
                const saved = localStorage.getItem(META_LIST_KEY);
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.warn('Failed to parse meta list, using defaults.', e);
                    }
                }
                localStorage.setItem(META_LIST_KEY, JSON.stringify(DEFAULT_METAS));
                return [...DEFAULT_METAS];
            }

            function saveMetaList(list) {
                localStorage.setItem(META_LIST_KEY, JSON.stringify(list));
            }

            function getApiUrl(path) {
                return `${API_BASE_URL}${path}`;
            }

            function getEntryDateFromText(text) {
                return String(text || '').split('\n')[0]?.trim() || '';
            }

            function getPendingQueue() {
                const saved = localStorage.getItem(PENDING_QUEUE_KEY);
                if (!saved) return {};
                try {
                    const parsed = JSON.parse(saved);
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch (e) {
                    console.warn('Failed to parse pending queue.', e);
                    return {};
                }
            }

            function savePendingQueue(queue) {
                localStorage.setItem(PENDING_QUEUE_KEY, JSON.stringify(queue));
            }

            function enqueuePendingEntry(text) {
                const entryDate = getEntryDateFromText(text);
                if (!entryDate) return;
                const queue = getPendingQueue();
                const existing = queue[entryDate];
                queue[entryDate] = {
                    text,
                    created_at: existing?.created_at || new Date().toISOString(),
                };
                savePendingQueue(queue);
                renderPendingQueue();
            }

            function removePendingEntry(entryDate) {
                const queue = getPendingQueue();
                delete queue[entryDate];
                savePendingQueue(queue);
                renderPendingQueue();
            }

            function formatPendingText(text) {
                const lines = String(text || '').split('\n');
                return lines.slice(0, 14).join('\n');
            }

            function renderPendingQueue() {
                const queue = getPendingQueue();
                const entries = Object.entries(queue).sort(([a], [b]) => a.localeCompare(b));
                const countEl = document.getElementById('pending-count');
                const container = document.getElementById('pending-queue');

                if (countEl) countEl.textContent = String(entries.length);
                if (!container) return;

                if (entries.length === 0) {
                    container.innerHTML = '<div class="queue-meta">当前没有待同步记录。</div>';
                    return;
                }

                container.innerHTML = '';

                entries.forEach(([entryDate, item]) => {
                    const row = document.createElement('div');
                    row.className = 'queue-item';

                    const dateEl = document.createElement('span');
                    dateEl.className = 'queue-date';
                    dateEl.textContent = entryDate;

                    const metaEl = document.createElement('span');
                    metaEl.className = 'queue-meta';
                    metaEl.textContent = `缓存于 ${item.created_at || '未知时间'}`;

                    const viewBtn = document.createElement('button');
                    viewBtn.textContent = '查看';
                    viewBtn.addEventListener('click', () => showPendingEntry(entryDate));

                    const submitBtn = document.createElement('button');
                    submitBtn.textContent = '提交';
                    submitBtn.addEventListener('click', () => submitPendingEntry(entryDate));

                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '删除';
                    deleteBtn.addEventListener('click', () => {
                        const confirmed = confirm(`删除 ${entryDate} 的待同步记录？`);
                        if (!confirmed) return;
                        removePendingEntry(entryDate);
                    });

                    row.appendChild(dateEl);
                    row.appendChild(metaEl);
                    row.appendChild(viewBtn);
                    row.appendChild(submitBtn);
                    row.appendChild(deleteBtn);
                    container.appendChild(row);
                });
            }

            async function refreshMetasFromAgent() {
                const statusEl = document.getElementById('meta-sync-status');
                if (statusEl) statusEl.textContent = '同步 metas 中...';

                try {
                    const resp = await fetch(getApiUrl('/metas'));
                    const data = await resp.json().catch(() => null);
                    if (!resp.ok || !data?.ok) {
                        if (statusEl) statusEl.textContent = '刷新失败：' + (data?.error || ('HTTP ' + resp.status));
                        return;
                    }

                    const nextList = (data.metas || []).map(meta => ({
                        key: meta.meta_key,
                        label: meta.label,
                    }));

                    if (nextList.length > 0) {
                        saveMetaList(nextList);
                        renderMetas();
                    }

                    if (statusEl) {
                        const count = nextList.length;
                        statusEl.textContent = `已从接口刷新 ${count} 个 meta`;
                    }
                } catch (e) {
                    if (statusEl) statusEl.textContent = '刷新失败：无法连接到 agent（' + (e?.message || e) + '）';
                }
            }

            function renderMetas() {
                const metaList = getMetaList();
                const container = document.getElementById('meta-list');
                container.innerHTML = '';

                metaList.forEach(meta => {
                    const countKey = `meta-count-${meta.key}`;
                    const count = localStorage.getItem(countKey) || 0;
                    if (todayChecks[meta.key] === undefined) {
                        todayChecks[meta.key] = false;
                    }

                    const wrapper = document.createElement('div');
                    wrapper.className = 'meta-item';

                    const label = document.createElement('span');
                    label.textContent = `${meta.label}：已完成 `;

                    const countSpan = document.createElement('span');
                    countSpan.id = `${meta.key}-count`;
                    countSpan.innerText = count;

                    const suffix = document.createElement('span');
                    suffix.textContent = ' 天';

                    const todayCheck = document.createElement('input');
                    todayCheck.type = 'checkbox';
                    todayCheck.className = 'today-check';
                    todayCheck.id = `${meta.key}-today`;
                    todayCheck.checked = todayChecks[meta.key];
                    todayCheck.title = '勾选后点击下方“完成”才会计入';
                    todayCheck.addEventListener('change', (e) => {
                        todayChecks[meta.key] = e.target.checked;
                        updatePreview();
                    });

                    const setButton = document.createElement('button');
                    setButton.textContent = '设定';
                    setButton.addEventListener('click', () => {
                        const newVal = prompt('请输入要设定的天数（非负整数）', count);
                        if (newVal === null) return;
                        setCount(meta.key, newVal);
                    });

                    const deleteButton = document.createElement('button');
                    deleteButton.textContent = '删除';
                    deleteButton.addEventListener('click', () => deleteMeta(meta.key));

                    wrapper.appendChild(label);
                    wrapper.appendChild(countSpan);
                    wrapper.appendChild(suffix);
                    wrapper.appendChild(todayCheck);
                    wrapper.appendChild(setButton);
                    wrapper.appendChild(deleteButton);

                    container.appendChild(wrapper);
                });

                updatePreview();
            }

            function increment(key) {
                const countKey = `meta-count-${key}`;
                let count = localStorage.getItem(countKey);
                count = count ? parseInt(count) + 1 : 1;
                localStorage.setItem(countKey, count);
                const span = document.getElementById(`${key}-count`);
                if (span) {
                    span.innerText = count;
                }
                updatePreview();
            }

            function setCount(key, value) {
                const countKey = `meta-count-${key}`;
                const parsed = parseInt(value);
                if (isNaN(parsed) || parsed < 0) {
                    alert('请输入有效的非负整数');
                    return;
                }
                localStorage.setItem(countKey, parsed);
                const span = document.getElementById(`${key}-count`);
                if (span) {
                    span.innerText = parsed;
                }
                updatePreview();
            }

            function deleteMeta(key) {
                const metaList = getMetaList();
                const target = metaList.find(m => m.key === key);
                if (!target) return;
                const confirmed = confirm(`删除 "${target.label}" ？操作不可撤销`);
                if (!confirmed) return;

                const nextList = metaList.filter(m => m.key !== key);
                saveMetaList(nextList);
                localStorage.removeItem(`meta-count-${key}`);
                delete todayChecks[key];
                renderMetas();
                updatePreview();
            }

            function addMeta() {
                const input = document.getElementById('new-meta-name');
                const rawName = input.value.trim();
                if (!rawName) return;

                const metaList = getMetaList();
                const exists = metaList.some(m => m.label === rawName);
                if (exists) {
                    alert('这个 Meta 已存在');
                    return;
                }

                // Generate a storage-friendly key
                const sanitized = rawName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
                const key = sanitized || `meta-${Date.now()}`;

                metaList.push({ key, label: rawName });
                saveMetaList(metaList);
                input.value = '';
                renderMetas();
            }

            function applyToday() {
                const metaList = getMetaList();
                let anyChecked = false;
                metaList.forEach(meta => {
                    if (todayChecks[meta.key]) {
                        anyChecked = true;
                        increment(meta.key);
                        todayChecks[meta.key] = false;
                        const checkbox = document.getElementById(`${meta.key}-today`);
                        if (checkbox) checkbox.checked = false;
                        todayApplied[meta.key] = true;
                    }
                });
                if (!anyChecked) {
                    alert('请先勾选今日完成的项目');
                }
                updatePreview();
            }

            function getTodayString() {
                const now = new Date();
                const local = new Date(now);
                // If it's before 4 AM, treat as the previous day to align with late-night journaling.
                if (local.getHours() < 4) {
                    local.setDate(local.getDate() - 1);
                }
                const offsetDate = new Date(local.getTime() - local.getTimezoneOffset() * 60000);
                return offsetDate.toISOString().split('T')[0];
            }

            function buildPreviewText() {
                const dateLine = getTodayString();
                const content = document.getElementById('daily-content').value.trim() || '内容.....';
                const metaLines = getMetaList().map(meta => {
                    const count = localStorage.getItem(`meta-count-${meta.key}`) || 0;
                    const pendingMark = (todayChecks[meta.key] || todayApplied[meta.key]) ? ' +' : '';
                    return `${meta.label}: ${count} 天${pendingMark}`;
                });
                const notes = (localStorage.getItem(META_NOTES_KEY) || '').trim();
                const notesLines = notes ? ['---', notes] : [];
                return [dateLine, content, ...metaLines, ...notesLines].join('\n');
            }

            function buildTodaySummary() {
                const dateLine = `日期：${getTodayString()}`;
                const metaList = getMetaList();
                const finished = [];
                const unfinished = [];
                metaList.forEach(meta => {
                    const done = todayChecks[meta.key] || todayApplied[meta.key];
                    (done ? finished : unfinished).push(meta.label);
                });
                const notes = (document.getElementById('meta-notes')?.value || localStorage.getItem(META_NOTES_KEY) || '').trim();
                const notesLine = notes ? `notes（前50字）：${notes.slice(0, 50)}` : '';
                const indent = '  ';
                const finishedLine = `${indent}■ ${finished.length ? finished.join('、') : '（无）'}`;
                const unfinishedLine = `${indent}□ ${unfinished.length ? unfinished.join('、') : '（无）'}`;
                const tipLine = '确认后将覆盖写入今天的数据，可再次发送修正';
                return [dateLine, finishedLine, unfinishedLine, notesLine, tipLine].filter(Boolean).join('\n');
            }

            function updatePreview() {
                const preview = document.getElementById('preview-text');
                if (preview) {
                    preview.textContent = buildPreviewText();
                }
            }

            async function copyPreview() {
                const text = buildPreviewText();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    try {
                        await navigator.clipboard.writeText(text);
                        alert('已复制到剪贴板');
                        return;
                    } catch (err) {
                        console.warn('Clipboard API failed, fallback to prompt.', err);
                    }
                }
                prompt('复制以下内容：', text);
            }

            async function sendToAgent() {
                const statusEl = document.getElementById('agent-status');
                const text = buildPreviewText();
                const entryDate = getEntryDateFromText(text);
                if (!confirm(buildTodaySummary())) return;
                const url = getApiUrl('/save');
                if (statusEl) statusEl.textContent = '发送中...';
                try {
                    const resp = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, source: 'daily_pad', ts: new Date().toISOString() })
                    });
                    const data = await resp.json().catch(() => null);
                    if (!resp.ok) {
                        if (statusEl) statusEl.textContent = '失败：' + (data?.error || ('HTTP ' + resp.status));
                        return;
                    }
                    removePendingEntry(entryDate);
                    if (statusEl) {
                        const warningText = data?.warning ? `（${data.warning}）` : '';
                        statusEl.textContent = '成功：' + (data?.message || 'ok') + warningText;
                    }
                } catch (e) {
                    enqueuePendingEntry(text);
                    if (statusEl) statusEl.textContent = '无法连接到 agent，已加入待同步队列（' + (e?.message || e) + '）';
                }
            }

            function buildEntryDialogText(data) {
                const entry = data.entry || {};
                const metas = data.metas || [];
                const metaLines = metas.map(meta =>
                    `${meta.label}: ${meta.count} ${meta.unit || ''}${meta.done ? ' +' : ''}`.trim()
                );

                return [
                    `日期：${entry.entry_date || ''}`,
                    '',
                    '正文：',
                    entry.content || '（空）',
                    '',
                    'Metas：',
                    metaLines.length ? metaLines.join('\n') : '（无）',
                    '',
                    'Meta Notes：',
                    entry.meta_notes || '（无）',
                ].join('\n');
            }

            function closeEntryDialog() {
                const dialog = document.getElementById('entry-dialog');
                if (dialog?.open) {
                    dialog.close();
                }
            }

            function openTextDialog(title, text) {
                const dialog = document.getElementById('entry-dialog');
                const titleEl = document.getElementById('entry-dialog-title');
                const contentEl = document.getElementById('entry-dialog-content');
                if (titleEl) titleEl.textContent = title;
                if (contentEl) contentEl.textContent = text;

                if (dialog?.showModal) {
                    dialog.showModal();
                } else {
                    alert(text);
                }
            }

            function showPendingEntry(entryDate) {
                const queue = getPendingQueue();
                const item = queue[entryDate];
                if (!item) return;
                openTextDialog(`${entryDate} 的待同步记录`, formatPendingText(item.text));
            }

            async function submitPendingEntry(entryDate) {
                const statusEl = document.getElementById('pending-status');
                const queue = getPendingQueue();
                const item = queue[entryDate];
                if (!item) return;

                if (statusEl) statusEl.textContent = `正在提交 ${entryDate}...`;
                try {
                    const resp = await fetch(getApiUrl('/save'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: item.text, source: 'pending_queue', ts: new Date().toISOString() })
                    });
                    const data = await resp.json().catch(() => null);
                    if (!resp.ok) {
                        if (statusEl) statusEl.textContent = `${entryDate} 提交失败：` + (data?.error || ('HTTP ' + resp.status));
                        return;
                    }

                    removePendingEntry(entryDate);
                    if (statusEl) statusEl.textContent = `${entryDate} 已提交到 agent`;
                } catch (e) {
                    if (statusEl) statusEl.textContent = `${entryDate} 提交失败：无法连接到 agent（` + (e?.message || e) + '）';
                }
            }

            async function retryAllPending() {
                const queue = getPendingQueue();
                const dates = Object.keys(queue).sort();
                const statusEl = document.getElementById('pending-status');

                if (dates.length === 0) {
                    if (statusEl) statusEl.textContent = '当前没有待同步记录';
                    return;
                }

                if (statusEl) statusEl.textContent = `开始尝试同步 ${dates.length} 条记录...`;
                for (const entryDate of dates) {
                    // 顺序提交，失败的条目会保留在队列中
                    // 这样更接近“逐条检查再入库”的流程。
                    await submitPendingEntry(entryDate);
                }
            }

            async function showEntryByDate() {
                const dateInput = document.getElementById('entry-date');
                const statusEl = document.getElementById('entry-fetch-status');
                const entryDate = dateInput?.value?.trim();

                if (!entryDate) {
                    if (statusEl) statusEl.textContent = '请先选择日期';
                    return;
                }

                if (statusEl) statusEl.textContent = '读取 entry 中...';

                try {
                    const resp = await fetch(getApiUrl(`/entry?date=${encodeURIComponent(entryDate)}`));
                    const data = await resp.json().catch(() => null);
                    if (!resp.ok || !data?.ok) {
                        if (statusEl) statusEl.textContent = '读取失败：' + (data?.error || ('HTTP ' + resp.status));
                        return;
                    }

                    openTextDialog(`${entryDate} 的记录`, buildEntryDialogText(data));
                    if (statusEl) statusEl.textContent = '读取成功';
                } catch (e) {
                    if (statusEl) statusEl.textContent = '读取失败：无法连接到 agent（' + (e?.message || e) + '）';
                }
            }

            document.getElementById('daily-content').addEventListener('input', updatePreview);

            // Meta notes persistence
            const metaNotesEl = document.getElementById('meta-notes');
            if (metaNotesEl) {
                metaNotesEl.value = localStorage.getItem(META_NOTES_KEY) || '';
                metaNotesEl.addEventListener('input', () => {
                    localStorage.setItem(META_NOTES_KEY, metaNotesEl.value);
                    updatePreview();
                });
            }
            const entryDateEl = document.getElementById('entry-date');
            if (entryDateEl) {
                entryDateEl.value = getTodayString();
            }
            renderMetas();
            updatePreview();
            renderPendingQueue();
            refreshMetasFromAgent();
        </script>

    </body>

</html>
