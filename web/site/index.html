<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Anfine Station</title>
  <link rel="stylesheet" href="./assets/site.css">
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">Personal Station</div>
        <div class="brand-title">Anfine</div>
      </div>
      <nav class="nav" aria-label="主导航">
        <a class="nav-link nav-link-primary" href="./pad/">Pad</a>
      </nav>
    </header>

    <section class="grid">
      <section class="panel span-12">
        <div class="section-head">
          <h2>监控</h2>
          <span class="section-meta">Server / Docker / Sync</span>
        </div>
        <iframe
          class="embed-frame monitor-embed"
          src="./grafana/d/daily-system-overview/daily-system-overview?orgId=1&kiosk&theme=dark"
          title="System Monitor"
        ></iframe>
      </section>

      <section class="panel span-12">
        <div class="section-head">
          <h2>Heatmap</h2>
          <span class="section-meta">每日字符数与 meta 状态</span>
        </div>
        <iframe class="embed-frame heatmap-embed" src="./journal/heatmap/" title="Heatmap"></iframe>
      </section>
    </section>

    <footer class="footer" data-site-footer></footer>
  </main>
  <script src="./assets/site.js"></script>
</body>
</html>
