services:
  web:
    image: nginx:1.27-alpine
    container_name: daily-system-web
    restart: unless-stopped
    depends_on:
      - cloud-api
      - grafana
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./web/site:/usr/share/nginx/html:ro
      - ./web/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  cloud-api:
    build: .
    image: daily-system-agent:latest
    container_name: daily-system-cloud-api
    restart: unless-stopped
    command: ["python", "cloud_api.py"]
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-dev-change-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      AGENT_SYNC_TOKEN: ${AGENT_SYNC_TOKEN:-dev-agent-sync-token}
      DISPLAY_DATA_DIR: /app/cloud_data
      AGENT_STATE_FILE: /app/agent_state/agent_state.json
      META_SNAPSHOT_FILE: /app/agent_state/meta_snapshot.json
    expose:
      - "8788"
    volumes:
      - ./server_queue:/app/server_queue
      - ./web/site/data:/app/cloud_data
      - ./agent_state:/app/agent_state

  agent:
    build: .
    image: daily-system-agent:latest
    container_name: daily-system-agent
    restart: unless-stopped
    command: ["python", "agent.py", "cloud-sync-loop"]
    environment:
      CLOUD_API_URL: ${CLOUD_API_URL:-http://cloud-api:8788}
      AGENT_SYNC_TOKEN: ${AGENT_SYNC_TOKEN:-dev-agent-sync-token}
      CLOUD_SYNC_INTERVAL_SECONDS: ${CLOUD_SYNC_INTERVAL_SECONDS:-30}
    volumes:
      - ./daily_system.db:/app/daily_system.db
      - ./daily_logs:/app/daily_logs
      - ./daily_meta_map.json:/app/daily_meta_map.json
      - ./daily_char_map.json:/app/daily_char_map.json
      - ./agent_inbox:/app/agent_inbox

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: daily-system-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.4.0
    container_name: daily-system-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://anfine.top/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: daily-system-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    expose:
      - "9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

volumes:
  prometheus_data:
  grafana_data:
